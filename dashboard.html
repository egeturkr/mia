<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA - Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <a class="logo" href="index.html">
            <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
            <span class="logo-text">MIA</span>
        </a>
        <nav>
            <a href="index.html" data-i18n="nav_home">Ana Sayfa</a>
            <a href="sirket.html" data-i18n="nav_company">Şirket</a>
            <a href="iletisim.html" data-i18n="nav_contact">İletişim</a>
            <div class="nav-divider"></div>
            <div id="loggedOutNav">
                <a href="login.html" class="btn btn-secondary btn-sm" data-i18n="nav_login">Giriş Yap</a>
                <a href="signup.html" class="btn btn-primary btn-sm" data-i18n="nav_signup">Kayıt Ol</a>
            </div>
            <div id="loggedInNav" style="display:none;">
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="demo.html" data-i18n="nav_analysis">Analiz</a>
                <span class="user-email" id="userEmail"></span>
                <button type="button" id="navLogout" class="btn btn-secondary btn-sm" data-i18n="nav_logout">Çıkış</button>
            </div>
            <div class="lang-switcher">
                <button type="button" class="lang-btn active" id="langTR">TR</button>
                <button type="button" class="lang-btn" id="langEN">EN</button>
            </div>
        </nav>
    </header>

    <main class="page-inner page-dashboard">
        <div class="dashboard-container">
            <div class="dashboard-header"><h1>Dashboard</h1><a href="demo.html" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span data-i18n="new_analysis">Yeni Analiz</span></a></div>
            <div class="dashboard-stats">
                <div class="dash-stat-card"><div class="dash-stat-label" data-i18n="dash_total">Toplam Analiz</div><div class="dash-stat-value" id="totalAnalyses">0</div></div>
                <div class="dash-stat-card"><div class="dash-stat-label" data-i18n="dash_avg">Ortalama Skor</div><div class="dash-stat-value good" id="avgScore">-</div></div>
                <div class="dash-stat-card"><div class="dash-stat-label" data-i18n="dash_violations">Toplam İhlal</div><div class="dash-stat-value bad" id="totalViolations">0</div></div>
                <div class="dash-stat-card"><div class="dash-stat-label" data-i18n="dash_month">Bu Ay</div><div class="dash-stat-value" id="thisMonth">0</div></div>
            </div>
            <div class="analyses-section"><h2 data-i18n="dash_history">Analiz Geçmişi</h2><div class="analyses-list" id="analysesList"></div></div>
        </div>
    </main>

    <footer><p data-i18n="footer">© 2026 MIA - Tüm hakları saklıdır.</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
